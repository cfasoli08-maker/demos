<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Veritas — Scripture. Context. Truth.</title>
<style>
  :root{
    --cream:#F5EFE4;
    --card:#FFFDF8;
    --accent:#7B4F2E;
    --accent-light:#EFE3D3;
    --ink:#3A2E22;
    --muted:#8F7E6B;
    --alert:#AE3E2E;
    --alert-light:#F6E4DF;
    --gold:#C79A4B;
    --divider:#E8DFCF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--cream);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    overscroll-behavior:none;
  }
  .serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--cream);position:relative;display:flex;flex-direction:column;}

  /* HEADER */
  header{
    position:sticky;top:0;z-index:50;background:var(--cream);
    padding:18px 20px 14px;border-bottom:1px solid var(--divider);
  }
  .greeting{font-size:13px;color:var(--muted);margin:0 0 4px;letter-spacing:.2px;}
  .header-row{display:flex;align-items:flex-end;justify-content:space-between;}
  .brand-title{font-size:30px;font-weight:700;color:var(--accent);margin:0;line-height:1;}
  .brand-tag{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
  .streak-pill{
    background:var(--accent);color:#fff;border-radius:20px;padding:7px 13px;
    font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap;
  }

  main{flex:1;padding:16px 16px 100px;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .section-label{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:18px 4px 10px;}
  .section-label:first-child{margin-top:2px;}

  /* VERSE CARDS */
  .verse-card{
    background:var(--card);border-radius:18px;padding:18px;margin-bottom:14px;
    box-shadow:0 4px 14px rgba(122,90,50,0.10);border:1px solid rgba(122,90,50,0.06);
    cursor:pointer;transition:box-shadow .2s ease;
  }
  .verse-card:active{box-shadow:0 2px 6px rgba(122,90,50,0.10);}
  .verse-card-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .verse-ref{font-size:18px;font-weight:700;margin:0;}
  .verse-topic{display:inline-block;background:var(--accent-light);color:var(--accent);font-size:11px;
    font-weight:600;padding:3px 9px;border-radius:20px;margin-top:6px;letter-spacing:.3px;}
  .warn-icon{
    width:30px;height:30px;border-radius:50%;background:var(--alert-light);color:var(--alert);
    display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-left:10px;
    border:none;cursor:pointer;
  }
  .verse-text{font-size:15px;line-height:1.55;margin:12px 0 0;color:var(--ink);font-style:italic;}
  .verse-card.open .verse-text{opacity:.85;}

  .layer-grid{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
  .verse-card.open .layer-grid{display:grid;}
  .layer-tile{
    background:var(--cream);border:1px solid var(--divider);border-radius:12px;padding:10px 8px;
    text-align:center;font-size:12.5px;font-weight:600;color:var(--accent);cursor:pointer;
  }
  .layer-tile.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .layer-content{
    display:none;margin-top:12px;padding:14px;background:var(--cream);border-radius:12px;
    font-size:13.5px;line-height:1.55;color:var(--ink);border-left:3px solid var(--accent);
  }
  .layer-content.show{display:block;}
  .layer-content b{color:var(--accent);}

  /* BOTTOM SHEET */
  .sheet-backdrop{
    position:fixed;inset:0;background:rgba(58,46,34,0.45);z-index:100;display:none;
  }
  .sheet-backdrop.show{display:block;}
  .bottom-sheet{
    position:fixed;left:0;right:0;bottom:-100%;max-width:480px;margin:0 auto;background:var(--card);
    border-radius:22px 22px 0 0;padding:22px 22px 26px;z-index:101;transition:bottom .3s ease;
    box-shadow:0 -8px 30px rgba(0,0,0,0.2);
  }
  .bottom-sheet.show{bottom:0;}
  .sheet-handle{width:38px;height:4px;background:var(--divider);border-radius:4px;margin:0 auto 16px;}
  .sheet-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--alert);margin:0 0 10px;}
  .sheet-body{font-size:14px;line-height:1.6;color:var(--ink);margin:0 0 18px;}
  .sheet-close{
    width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;
    font-size:15px;font-weight:600;cursor:pointer;
  }

  /* MY PATH */
  .path-header{background:var(--card);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 4px 14px rgba(122,90,50,0.10);}
  .path-header h2{margin:0 0 4px;font-size:19px;}
  .path-header p{margin:0 0 14px;font-size:13px;color:var(--muted);}
  .progress-track{background:var(--accent-light);height:8px;border-radius:6px;overflow:hidden;}
  .progress-fill{background:var(--accent);height:100%;width:80%;border-radius:6px;}
  .progress-caption{font-size:12px;color:var(--muted);margin-top:8px;}
  .week-item{
    background:var(--card);border-radius:16px;padding:15px 16px;margin-bottom:10px;
    display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(122,90,50,0.07);
  }
  .week-item.active{border:1.5px solid var(--accent);}
  .week-check{
    width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;
  }
  .week-check.done{background:var(--accent);color:#fff;}
  .week-check.pending{background:var(--accent-light);color:var(--accent);}
  .week-title{font-size:14.5px;font-weight:700;margin:0;}
  .week-sub{font-size:12.5px;color:var(--muted);margin:2px 0 0;}

  /* SEASONS */
  .season-card{
    background:var(--card);border-radius:18px;padding:17px;margin-bottom:12px;box-shadow:0 4px 14px rgba(122,90,50,0.09);
    display:flex;gap:14px;align-items:flex-start;
  }
  .season-date{
    background:var(--accent);color:#fff;border-radius:12px;padding:8px 10px;text-align:center;flex-shrink:0;min-width:52px;
  }
  .season-date .d{font-size:17px;font-weight:700;line-height:1;}
  .season-date .m{font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
  .season-name{font-size:16px;font-weight:700;margin:0 0 4px;}
  .season-angle{font-size:13px;line-height:1.5;color:var(--muted);margin:0;}

  /* LIBRARY */
  .lib-cat-title{font-size:14px;font-weight:700;color:var(--accent);margin:22px 4px 10px;}
  .lib-cat-title:first-of-type{margin-top:2px;}
  .lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .lib-tile{
    background:var(--card);border-radius:14px;padding:16px 10px;text-align:center;box-shadow:0 3px 10px rgba(122,90,50,0.08);
    cursor:pointer;border:1.5px solid transparent;
  }
  .lib-tile.active{border-color:var(--accent);}
  .lib-tile-name{font-size:13.5px;font-weight:700;margin:0;}
  .lib-detail{
    display:none;grid-column:1 / -1;background:var(--accent-light);border-radius:14px;padding:15px;margin-top:2px;
  }
  .lib-detail.show{display:block;}
  .lib-detail .ref{font-weight:700;color:var(--accent);font-size:13.5px;margin:0 0 6px;}
  .lib-detail .insight{font-size:13px;line-height:1.5;color:var(--ink);margin:0 0 12px;}
  .lib-detail button{
    background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;
  }

  /* BOTTOM NAV */
  nav{
    position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--card);
    border-top:1px solid var(--divider);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:60;
  }
  .nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 0;cursor:pointer;color:var(--muted);font-size:11px;font-weight:600;}
  .nav-btn .ic{font-size:20px;}
  .nav-btn.active{color:var(--accent);}
</style>
</head>
<body>
<div id="app">

  <header>
    <p class="greeting">Good morning, Christopher</p>
    <div class="header-row">
      <div>
        <p class="brand-title serif">Veritas</p>
        <p class="brand-tag">Scripture · Context · Truth</p>
      </div>
      <div class="streak-pill">Day 47 🔥</div>
    </div>
  </header>

  <main>

    <!-- EXPLORE -->
    <section class="tab-panel active" id="tab-explore">
      <p class="section-label">Today's Study Set</p>
      <div id="verse-cards"></div>
    </section>

    <!-- MY PATH -->
    <section class="tab-panel" id="tab-path">
      <div class="path-header">
        <h2 class="serif">5-Week Study Path</h2>
        <p>Foundations to Application — one theme at a time</p>
        <div class="progress-track"><div class="progress-fill"></div></div>
        <p class="progress-caption">4 of 5 weeks complete</p>
      </div>
      <div id="week-list"></div>
    </section>

    <!-- SEASONS -->
    <section class="tab-panel" id="tab-seasons">
      <p class="section-label">Upcoming on the Calendar</p>
      <div id="season-list"></div>
    </section>

    <!-- LIBRARY -->
    <section class="tab-panel" id="tab-library">
      <p class="section-label">12 Topics, Drillable Anytime</p>
      <div id="library-list"></div>
    </section>

  </main>

  <nav>
    <button class="nav-btn active" data-tab="explore"><span class="ic">🔍</span>Explore</button>
    <button class="nav-btn" data-tab="path"><span class="ic">🧭</span>My Path</button>
    <button class="nav-btn" data-tab="seasons"><span class="ic">🍂</span>Seasons</button>
    <button class="nav-btn" data-tab="library"><span class="ic">📚</span>Library</button>
  </nav>

</div>

<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <p class="sheet-title">⚠️ <span id="sheetTitle">Misuse Alert</span></p>
  <p class="sheet-body" id="sheetBody"></p>
  <button class="sheet-close" id="sheetCloseBtn">Got it</button>
</div>

<script>
// ---------- DATA ----------
const verses = [
  {
    id:'v1', ref:'Matthew 7:15', topic:'False Prophets', flagged:true,
    text:'"Beware of false prophets, which come to you in sheep\'s clothing, but inwardly they are ravening wolves."',
    layers:{
      Author:'Written by Matthew, a former tax collector turned disciple, addressing a Jewish audience anxious about being misled by religious leaders.',
      Meaning:'Jesus warns that the most dangerous deception looks harmless on the outside — genuine character shows up in fruit over time, not appearance in a moment.',
      Connections:'Echoes Old Testament warnings about false prophets in Deuteronomy, and anticipates 2 Peter\'s caution about deceptive teachers entering the early church.',
      'Context Check':'Often quoted online to instantly dismiss any leader someone disagrees with. The verse is actually about testing fruit over time, not reacting to a single soundbite.'
    },
    alert:'This verse is frequently used to instantly discredit any pastor, influencer, or leader after a single post someone disagrees with. The original context calls for evaluating fruit — consistent character and outcome over time — not a snap judgment based on one moment.'
  },
  {
    id:'v2', ref:'Mark 9:29', topic:'Fasting', flagged:false,
    text:'"This kind can come forth by nothing, but by prayer and fasting."',
    layers:{
      Author:'Mark, writing the earliest Gospel, capturing Jesus\'s private explanation to his disciples after they were unable to help a boy.',
      Meaning:'Some breakthroughs require sustained spiritual discipline, not just a single request in the moment.',
      Connections:'Builds on Old Testament fasting practice in Joel and Esther, and models the fasting rhythm the early church later practices in Acts.',
      'Context Check':'Sometimes used to promise fasting will "unlock" any outcome on demand. The passage is really about dependence, not a spiritual formula.'
    }
  },
  {
    id:'v3', ref:'Romans 12:2', topic:'Mental Health', flagged:false,
    text:'"And be not conformed to this world: but be ye transformed by the renewing of your mind."',
    layers:{
      Author:'Paul, writing to the church in Rome, a mixed community under real cultural and social pressure.',
      Meaning:'Lasting change starts with how the mind is renewed, not just managing outward behavior.',
      Connections:'Rooted in Old Testament calls to "circumcise the heart" in Deuteronomy, echoed later in Ephesians\' language of putting on a new mind.',
      'Context Check':'Frequently used as a stand-alone self-help slogan, detached from its original call to communal discernment and worship.'
    }
  },
  {
    id:'v4', ref:'Matthew 6:24', topic:'Finances', flagged:true,
    text:'"No man can serve two masters... Ye cannot serve God and mammon."',
    layers:{
      Author:'Matthew, recording Jesus\'s Sermon on the Mount teaching on undivided loyalty.',
      Meaning:'Money is never neutral in this teaching — it functions as a rival master actively competing for devotion.',
      Connections:'Echoes the exclusivity of the first commandment in Exodus, reinforced later by 1 Timothy\'s warning about the love of money.',
      'Context Check':'Often stretched to condemn wealth itself. The verse targets divided loyalty, not the possession of money or work.'
    },
    alert:'This verse gets used both to shame anyone with money and to justify ignoring stewardship altogether. Jesus is naming a heart posture — divided loyalty — not condemning money, work, or provision itself.'
  }
];

const weeks = [
  {n:1, title:'Foundations', sub:'Who Wrote This, and Why', done:true},
  {n:2, title:'Interpretation', sub:'Reading in Context', done:true},
  {n:3, title:'Testament Connections', sub:'Old Meets New', done:true},
  {n:4, title:'Discernment', sub:'Spotting Misuse Today', done:true},
  {n:5, title:'Application', sub:'Living It Out This Week', done:false}
];

const seasons = [
  {name:'Pentecost', d:'24', m:'May', angle:'The Spirit\'s arrival, and what it means to be sent, not just filled.'},
  {name:'Juneteenth', d:'19', m:'Jun', angle:'Freedom and Exodus — the Biblical thread of liberation running through both testaments.'},
  {name:'Rosh Hashanah', d:'12', m:'Sep', angle:'New beginnings, and the shofar\'s call to spiritual awareness.'},
  {name:'Yom Kippur', d:'21', m:'Sep', angle:'Atonement, and how it points forward toward the New Testament.'}
];

const library = [
  {cat:'Health', items:[
    {name:'Mental Health', ref:'Romans 12:2', insight:'Renewal starts in the mind before it shows up in behavior.'},
    {name:'Physical Health', ref:'1 Corinthians 6:19', insight:'The body is treated as sacred space, not just a machine to optimize.'},
    {name:'Spiritual Health', ref:'Galatians 5:22', insight:'Fruit, not intensity, is the real measure of spiritual growth.'},
    {name:'Fasting', ref:'Mark 9:29', insight:'Some breakthroughs require sustained discipline, not one request.'}
  ]},
  {cat:'Life', items:[
    {name:'Finances', ref:'Matthew 6:24', insight:'Money functions as a rival master competing for devotion.'},
    {name:'Marriage', ref:'Ephesians 5:25', insight:'Love is defined here by self-giving, not by feeling.'},
    {name:'Purpose', ref:'Jeremiah 29:11', insight:'Direction is promised even inside displacement and delay.'},
    {name:'Justice', ref:'Micah 6:8', insight:'Justice, mercy, and humility are named as inseparable.'}
  ]},
  {cat:'Character', items:[
    {name:'Fear', ref:'2 Timothy 1:7', insight:'Fear is named as something given — which means it can be un-given.'},
    {name:'False Prophets', ref:'Matthew 7:15', insight:'Genuine character shows in fruit, not appearance.'},
    {name:'Forgiveness', ref:'Matthew 18:21', insight:'Forgiveness is framed as an ongoing practice, not a one-time transaction.'},
    {name:'Death', ref:'1 Corinthians 15:55', insight:'Death is confronted directly here, not avoided or softened.'}
  ]}
];

// ---------- RENDER: EXPLORE ----------
const verseWrap = document.getElementById('verse-cards');
verses.forEach(v=>{
  const card = document.createElement('div');
  card.className='verse-card';
  card.id='card-'+v.id;
  const layerKeys = Object.keys(v.layers);
  card.innerHTML = `
    <div class="verse-card-top">
      <div>
        <p class="verse-ref serif">${v.ref}</p>
        <span class="verse-topic">${v.topic}</span>
      </div>
      ${v.flagged ? `<button class="warn-icon" data-alert="${v.id}">⚠️</button>` : ''}
    </div>
    <p class="verse-text">${v.text}</p>
    <div class="layer-grid">
      ${layerKeys.map(k=>`<div class="layer-tile" data-verse="${v.id}" data-layer="${k}">${k}</div>`).join('')}
    </div>
    <div class="layer-content" id="content-${v.id}"></div>
  `;
  verseWrap.appendChild(card);

  card.addEventListener('click', (e)=>{
    if(e.target.closest('.warn-icon') || e.target.closest('.layer-tile')) return;
    card.classList.toggle('open');
  });
});

document.addEventListener('click', (e)=>{
  const tile = e.target.closest('.layer-tile');
  if(!tile) return;
  e.stopPropagation();
  const vid = tile.dataset.verse, layer = tile.dataset.layer;
  const v = verses.find(x=>x.id===vid);
  const contentBox = document.getElementById('content-'+vid);
  const siblingTiles = tile.parentElement.querySelectorAll('.layer-tile');
  const alreadyActive = tile.classList.contains('active');
  siblingTiles.forEach(t=>t.classList.remove('active'));
  if(alreadyActive){
    contentBox.classList.remove('show');
    contentBox.innerHTML='';
  } else {
    tile.classList.add('active');
    contentBox.innerHTML = `<b>${layer}</b><br>${v.layers[layer]}`;
    contentBox.classList.add('show');
  }
});

// ---------- ALERT BOTTOM SHEET ----------
const sheet = document.getElementById('bottomSheet');
const backdrop = document.getElementById('sheetBackdrop');
document.addEventListener('click',(e)=>{
  const btn = e.target.closest('.warn-icon');
  if(!btn) return;
  e.stopPropagation();
  const v = verses.find(x=>x.id===btn.dataset.alert);
  document.getElementById('sheetTitle').textContent = 'Misuse Alert — '+v.topic;
  document.getElementById('sheetBody').textContent = v.alert;
  sheet.classList.add('show');
  backdrop.classList.add('show');
});
function closeSheet(){ sheet.classList.remove('show'); backdrop.classList.remove('show'); }
document.getElementById('sheetCloseBtn').addEventListener('click', closeSheet);
backdrop.addEventListener('click', closeSheet);

// ---------- RENDER: MY PATH ----------
const weekList = document.getElementById('week-list');
weeks.forEach(w=>{
  const item = document.createElement('div');
  item.className = 'week-item'+(!w.done?' active':'');
  item.innerHTML = `
    <div class="week-check ${w.done?'done':'pending'}">${w.done?'✓':w.n}</div>
    <div>
      <p class="week-title">Week ${w.n} — ${w.title}</p>
      <p class="week-sub">${w.sub}${!w.done?' · In progress':''}</p>
    </div>
  `;
  weekList.appendChild(item);
});

// ---------- RENDER: SEASONS ----------
const seasonList = document.getElementById('season-list');
seasons.forEach(s=>{
  const card = document.createElement('div');
  card.className='season-card';
  card.innerHTML = `
    <div class="season-date"><div class="d">${s.d}</div><div class="m">${s.m}</div></div>
    <div>
      <p class="season-name serif">${s.name}</p>
      <p class="season-angle">${s.angle}</p>
    </div>
  `;
  seasonList.appendChild(card);
});

// ---------- RENDER: LIBRARY ----------
const libWrap = document.getElementById('library-list');
library.forEach(group=>{
  const title = document.createElement('p');
  title.className='lib-cat-title';
  title.textContent = group.cat;
  libWrap.appendChild(title);

  const grid = document.createElement('div');
  grid.className='lib-grid';
  group.items.forEach((item,idx)=>{
    const tile = document.createElement('div');
    tile.className='lib-tile';
    tile.dataset.cat = group.cat;
    tile.dataset.idx = idx;
    tile.innerHTML = `<p class="lib-tile-name">${item.name}</p>`;
    grid.appendChild(tile);
  });
  const detail = document.createElement('div');
  detail.className='lib-detail';
  detail.id='detail-'+group.cat;
  grid.appendChild(detail);
  libWrap.appendChild(grid);
});

document.addEventListener('click',(e)=>{
  const tile = e.target.closest('.lib-tile');
  if(!tile) return;
  const cat = tile.dataset.cat, idx = +tile.dataset.idx;
  const group = library.find(g=>g.cat===cat);
  const item = group.items[idx];
  const detail = document.getElementById('detail-'+cat);
  const allTiles = tile.parentElement.querySelectorAll('.lib-tile');
  const wasActive = tile.classList.contains('active');
  allTiles.forEach(t=>t.classList.remove('active'));
  if(wasActive){
    detail.classList.remove('show'); detail.innerHTML='';
  } else {
    tile.classList.add('active');
    detail.innerHTML = `<p class="ref">${item.ref}</p><p class="insight">${item.insight}</p><button>Study in Explore</button>`;
    detail.classList.add('show');
  }
});

// ---------- TABS ----------
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});
</script>
</body>
</html>
